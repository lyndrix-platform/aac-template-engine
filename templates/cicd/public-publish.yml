# ==========================================================================
# PUBLIC MIRROR PUBLISH (opt-in, tag-triggered)
# ==========================================================================
# Publishes a historyless, source-of-truth snapshot of a service repo to its
# public GitHub correspondent under github.com/app-as-code/<service>, plus a
# GitHub Release carrying freshly-generated, placeholder-based deployment
# manifests as a downloadable asset.
#
# A service opts in by including this file in its .gitlab-ci.yml. Gate the
# include to release tags so the credentialed job is never loaded elsewhere:
#   include:
#     - project: 'aac-application-definitions/aac-template-engine'
#       ref: main
#       file: '/templates/cicd/public-publish.yml'
#       rules:
#         - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
#
# Requirements (set as masked GitLab CI/CD variables, group-level recommended):
#   PUBLISH_TOKEN  - GitHub fine-grained PAT, owner app-as-code, Contents: RW
#
# Design (fail-closed):
#   - Deployment manifests are (re)generated by the LOCAL template engine from
#     the repo's own service.yml. In the service-repo context there is no
#     iac-controller override, so generation uses only the public placeholder
#     vars (example.com / CHANGE_ME / secrets: {}) -- never real values.
#     deployments/ is wiped first so stale committed artifacts cannot leak.
#   - Current state only (no .git) -> private history is never pushed.
#   - ALLOWLIST: only explicitly-permitted paths are published. Anything not
#     listed is dropped, so an unanticipated secret-bearing file can never leak
#     (deliberately NOT a denylist). Extend PUBLIC_INCLUDE_PATHS per service.
#   - gitleaks runs as a HARD second-line gate over the assembled tree,
#     including the freshly-generated deployments/.
#   - The public repo keeps its own clean changelog: one commit per release tag.
#   - Triggered on release tags only (vX.Y.Z).
# ==========================================================================

variables:
  PUBLIC_GH_ORG: "app-as-code"
  # ALLOWLIST of paths to publish. Space-separated; files or dirs. Includes the
  # freshly-generated deployments/ (placeholder-based). Generated output is safe
  # ONLY because it is regenerated here from the public service.yml.
  PUBLIC_INCLUDE_PATHS: "service.yml .gitlab-ci.yml renovate.json README.md LICENSE deployments"
  # Deployment manifests to generate from placeholders (space-separated).
  PUBLIC_GEN_TYPES: "docker_compose"
  PUBLIC_GEN_STAGE: "prod"
  PUBLIC_TEMPLATE_PATH: "/opt/aac-template-engine"

publish-public:
  stage: documentation
  image:
    name: "$CI_CUSTOM_REGISTRY/$CI_TEMPLATE_ENGINE_IMAGE:$CI_TEMPLATE_ENGINE_TAG"
    pull_policy: always
  variables:
    GITLEAKS_VERSION: "8.18.4"
  rules:
    # Release tags only: v1.2.3
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache git curl tar
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
  script:
    - |
      set -e
      if [ -z "${PUBLISH_TOKEN}" ]; then
        echo "PUBLISH_TOKEN is not set. Aborting public publish."
        exit 1
      fi

      SERVICE="${CI_PROJECT_NAME}"
      CLEAN_URL="https://github.com/${PUBLIC_GH_ORG}/${SERVICE}.git"
      # Token is supplied inline to push / via Authorization header only -- never
      # written to .git/config and never echoed (no set -x). GitLab masks it.
      AUTH_URL="https://x-access-token:${PUBLISH_TOKEN}@github.com/${PUBLIC_GH_ORG}/${SERVICE}.git"
      API="https://api.github.com/repos/${PUBLIC_GH_ORG}/${SERVICE}"
      UPLOADS="https://uploads.github.com/repos/${PUBLIC_GH_ORG}/${SERVICE}"

      # 1) Regenerate deployments from PLACEHOLDERS only (clean slate first).
      rm -rf deployments
      for t in $PUBLIC_GEN_TYPES; do
        echo "Generating ${t} (stage=${PUBLIC_GEN_STAGE}) from service.yml placeholders..."
        python3 -m manifest_generator.main \
          --ssot-json service.yml \
          --template-path "${PUBLIC_TEMPLATE_PATH}" \
          --deployment-type "${t}" \
          --stage "${PUBLIC_GEN_STAGE}"
      done

      # 2) ALLOWLIST: assemble the public tree from permitted paths only.
      rm -rf /tmp/public && mkdir -p /tmp/public
      for path in $PUBLIC_INCLUDE_PATHS; do
        if [ -e "$path" ]; then
          mkdir -p "/tmp/public/$(dirname "$path")"
          cp -a "$path" "/tmp/public/$path"
        fi
      done
      if [ -z "$(ls -A /tmp/public)" ]; then
        echo "Allowlist produced an empty tree -- nothing to publish. Aborting."
        exit 1
      fi
      echo "Allowlisted tree to publish:"
      (cd /tmp/public && find . -type f | sort)

      # 3) HARD secret-scan gate (defense in depth, covers generated manifests).
      echo "Scanning snapshot with gitleaks..."
      gitleaks detect --source /tmp/public --no-git --redact --exit-code 1

      # 4) Clone the public repo (tokenless; it is public) and replace its tree.
      rm -rf /tmp/mirror
      git clone --depth 1 "${CLEAN_URL}" /tmp/mirror
      find /tmp/mirror -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
      cp -a /tmp/public/. /tmp/mirror/

      # 5) One release commit on top of the public changelog, then push.
      cd /tmp/mirror
      git config user.name "app-as-code-bot"
      git config user.email "ci@app-as-code"
      git add -A
      if git diff --cached --quiet; then
        echo "No changes for ${CI_COMMIT_TAG}; tree unchanged."
      else
        git commit -m "release: ${CI_COMMIT_TAG}"
        git push "${AUTH_URL}" HEAD:main
      fi
      git tag -f "${CI_COMMIT_TAG}"
      git push -f "${AUTH_URL}" "${CI_COMMIT_TAG}"

      # 6) Package generated deployments and attach to a GitHub Release.
      #    Best-effort: the full tree incl. deployments/ is already in the repo,
      #    so GitHub's auto-generated source tarball covers downloads even if the
      #    custom asset upload (separate uploads.github.com host) is unavailable.
      ASSET="/tmp/deployments-${CI_COMMIT_TAG}.tar.gz"
      if [ -d /tmp/public/deployments ]; then
        tar -czf "${ASSET}" -C /tmp/public deployments

        # Create the release, or reuse it if it already exists (idempotent).
        CREATE_OUT=$(curl -sS -w $'\n%{http_code}' -X POST "${API}/releases" \
          -H "Authorization: Bearer ${PUBLISH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "{\"tag_name\":\"${CI_COMMIT_TAG}\",\"name\":\"${CI_COMMIT_TAG}\",\"body\":\"Generated deployment manifests (placeholder values). Configure before use.\"}")
        CREATE_CODE=$(printf '%s' "${CREATE_OUT}" | tail -n1)
        REL_ID=$(printf '%s' "${CREATE_OUT}" | sed '$d' | jq -r '.id // empty')
        echo "Release create: HTTP ${CREATE_CODE} (id=${REL_ID:-none})"
        if [ -z "${REL_ID}" ]; then
          REL_ID=$(curl -sS "${API}/releases/tags/${CI_COMMIT_TAG}" \
            -H "Authorization: Bearer ${PUBLISH_TOKEN}" \
            -H "Accept: application/vnd.github+json" | jq -r '.id // empty')
          echo "Reusing existing release id=${REL_ID:-none}"
        fi

        if [ -n "${REL_ID}" ]; then
          UP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            "${UPLOADS}/releases/${REL_ID}/assets?name=deployments-${CI_COMMIT_TAG}.tar.gz" \
            -H "Authorization: Bearer ${PUBLISH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/gzip" \
            --data-binary "@${ASSET}")
          echo "Asset upload: HTTP ${UP_CODE}"
          if [ "${UP_CODE}" = "201" ]; then
            echo "Attached deployments-${CI_COMMIT_TAG}.tar.gz to release ${CI_COMMIT_TAG}."
          else
            echo "WARNING: asset upload failed (HTTP ${UP_CODE}). deployments/ is still in the repo tree and in the release source tarball."
          fi
        else
          echo "WARNING: no GitHub release id for ${CI_COMMIT_TAG}; skipped asset upload."
        fi
      fi
      echo "Published ${SERVICE} ${CI_COMMIT_TAG} to ${PUBLIC_GH_ORG}/${SERVICE}."
