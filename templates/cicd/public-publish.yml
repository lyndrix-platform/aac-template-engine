# ==========================================================================
# PUBLIC MIRROR PUBLISH (opt-in, tag-triggered)
# ==========================================================================
# Publishes a historyless, source-of-truth snapshot of a service repo to its
# public GitHub correspondent under github.com/app-as-code/<service>.
#
# A service opts in by including this file AND defining the job's `extends`:
#   include:
#     - project: 'aac-application-definitions/aac-template-engine'
#       ref: main
#       file: '/templates/cicd/public-publish.yml'
#
# Requirements (set as masked GitLab CI/CD variables, group-level recommended):
#   PUBLISH_TOKEN  - GitHub PAT with `repo` scope on the app-as-code org
#
# Design:
#   - Current state only (git archive HEAD) -> no private history is ever pushed.
#   - Generated output (deployments/) and secret-bearing files are excluded.
#   - gitleaks runs as a HARD gate: any secret match fails the job.
#   - The public repo keeps its own clean changelog: one commit per release tag.
#   - Triggered on release tags only (vX.Y.Z), mirroring the platform's
#     git-tag-driven release model.
# ==========================================================================

variables:
  PUBLIC_GH_ORG: "app-as-code"
  # Files/dirs that must never reach the public mirror. deployments/ is the
  # CI-generated render (docker-compose, .env, stack.env, k8s secrets, etc.).
  PUBLIC_EXCLUDE_GLOBS: "deployments .ssot_vars.json stack.env .env secrets.json *.enc.yaml"

publish-public:
  stage: documentation
  image: alpine:3.20
  variables:
    GITLEAKS_VERSION: "8.18.4"
  rules:
    # Release tags only: v1.2.3
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache git curl tar
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
  script:
    - |
      set -e
      if [ -z "${PUBLISH_TOKEN}" ]; then
        echo "PUBLISH_TOKEN is not set. Aborting public publish."
        exit 1
      fi

      SERVICE="${CI_PROJECT_NAME}"
      PUBLIC_REPO="https://x-access-token:${PUBLISH_TOKEN}@github.com/${PUBLIC_GH_ORG}/${SERVICE}.git"

      # 1) Build a clean, current-state-only tree (no .git, no history).
      rm -rf /tmp/public && mkdir -p /tmp/public
      git archive HEAD | tar -x -C /tmp/public
      for glob in $PUBLIC_EXCLUDE_GLOBS; do
        rm -rf /tmp/public/$glob
      done

      # 2) HARD secret-scan gate on exactly what would be published.
      echo "Scanning sanitized snapshot with gitleaks..."
      gitleaks detect --source /tmp/public --no-git --redact --exit-code 1

      # 3) Clone the public repo's own clean history and replace its tree.
      rm -rf /tmp/mirror
      git clone --depth 1 "${PUBLIC_REPO}" /tmp/mirror
      # remove all tracked content except .git, then drop in the new snapshot
      find /tmp/mirror -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
      cp -a /tmp/public/. /tmp/mirror/

      # 4) Commit one release on top of the public changelog and push.
      cd /tmp/mirror
      git config user.name "app-as-code-bot"
      git config user.email "ci@app-as-code"
      git add -A
      if git diff --cached --quiet; then
        echo "No changes for ${CI_COMMIT_TAG}; nothing to publish."
        exit 0
      fi
      git commit -m "release: ${CI_COMMIT_TAG}"
      git tag "${CI_COMMIT_TAG}"
      git push origin HEAD:main
      git push origin "${CI_COMMIT_TAG}"
      echo "Published ${SERVICE} ${CI_COMMIT_TAG} to ${PUBLIC_GH_ORG}/${SERVICE}."
