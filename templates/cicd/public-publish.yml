# ==========================================================================
# PUBLIC MIRROR PUBLISH (opt-in, tag-triggered)
# ==========================================================================
# Publishes a historyless, source-of-truth snapshot of a service repo to its
# public GitHub correspondent under github.com/app-as-code/<service>.
#
# A service opts in by including this file in its .gitlab-ci.yml. Gate the
# include to release tags so the credentialed job is never loaded elsewhere:
#   include:
#     - project: 'aac-application-definitions/aac-template-engine'
#       ref: main
#       file: '/templates/cicd/public-publish.yml'
#       rules:
#         - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
#
# Requirements (set as masked GitLab CI/CD variables, group-level recommended):
#   PUBLISH_TOKEN  - GitHub fine-grained PAT, owner app-as-code, Contents: RW
#
# Design (fail-closed):
#   - Current state only (no .git) -> private history is never pushed.
#   - ALLOWLIST: only explicitly-permitted source paths are published. Anything
#     not listed is dropped, so an unanticipated secret-bearing file can never
#     leak (this is deliberately NOT a denylist). Services that need to publish
#     extra source paths extend PUBLIC_INCLUDE_PATHS in their own .gitlab-ci.yml.
#   - gitleaks runs as a HARD second-line gate over the allowlisted tree.
#   - The public repo keeps its own clean changelog: one commit per release tag.
#   - Triggered on release tags only (vX.Y.Z), mirroring the platform's
#     git-tag-driven release model.
# ==========================================================================

variables:
  PUBLIC_GH_ORG: "app-as-code"
  # ALLOWLIST of source paths to publish. Space-separated; files or dirs.
  # Generated output (deployments/) and any unlisted file are never published.
  PUBLIC_INCLUDE_PATHS: "service.yml .gitlab-ci.yml renovate.json README.md LICENSE"

publish-public:
  stage: documentation
  image: alpine:3.20
  variables:
    GITLEAKS_VERSION: "8.18.4"
  rules:
    # Release tags only: v1.2.3
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache git curl tar
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
  script:
    - |
      set -e
      if [ -z "${PUBLISH_TOKEN}" ]; then
        echo "PUBLISH_TOKEN is not set. Aborting public publish."
        exit 1
      fi

      SERVICE="${CI_PROJECT_NAME}"
      CLEAN_URL="https://github.com/${PUBLIC_GH_ORG}/${SERVICE}.git"
      # Token is supplied inline to the push commands only -- never written to
      # .git/config and never echoed (script runs without set -x). GitLab masks
      # PUBLISH_TOKEN in job logs.
      AUTH_URL="https://x-access-token:${PUBLISH_TOKEN}@github.com/${PUBLIC_GH_ORG}/${SERVICE}.git"

      # 1) ALLOWLIST: assemble the public tree from permitted paths only.
      rm -rf /tmp/public && mkdir -p /tmp/public
      for path in $PUBLIC_INCLUDE_PATHS; do
        if [ -e "$path" ]; then
          mkdir -p "/tmp/public/$(dirname "$path")"
          cp -a "$path" "/tmp/public/$path"
        fi
      done
      if [ -z "$(ls -A /tmp/public)" ]; then
        echo "Allowlist produced an empty tree -- nothing to publish. Aborting."
        exit 1
      fi
      echo "Allowlisted tree to publish:"
      (cd /tmp/public && find . -type f | sort)

      # 2) HARD secret-scan gate (defense in depth over the allowlist).
      echo "Scanning snapshot with gitleaks..."
      gitleaks detect --source /tmp/public --no-git --redact --exit-code 1

      # 3) Clone the public repo (no token needed -- it is public) and replace
      #    its tree with the snapshot, preserving its own clean history.
      rm -rf /tmp/mirror
      git clone --depth 1 "${CLEAN_URL}" /tmp/mirror
      find /tmp/mirror -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
      cp -a /tmp/public/. /tmp/mirror/

      # 4) One release commit on top of the public changelog, then push.
      cd /tmp/mirror
      git config user.name "app-as-code-bot"
      git config user.email "ci@app-as-code"
      git add -A
      if git diff --cached --quiet; then
        echo "No changes for ${CI_COMMIT_TAG}; nothing to publish."
        exit 0
      fi
      git commit -m "release: ${CI_COMMIT_TAG}"
      git tag "${CI_COMMIT_TAG}"
      git push "${AUTH_URL}" HEAD:main
      git push "${AUTH_URL}" "${CI_COMMIT_TAG}"
      echo "Published ${SERVICE} ${CI_COMMIT_TAG} to ${PUBLIC_GH_ORG}/${SERVICE}."
