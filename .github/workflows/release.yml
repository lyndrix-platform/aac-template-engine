name: Release Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, e.g. v0.0.4"
        required: false
        type: string
      source_sha:
        description: "Source commit SHA from upstream CI"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      BASE_IMAGE: ghcr.io/lyndrix-platform/ansible-ci-image:latest
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "Could not determine release tag"
            exit 1
          fi
          VERSION="${TAG#v}"
          MINOR="$(printf '%s' "$VERSION" | cut -d. -f1,2)"
          IS_PRERELEASE="false"
          if printf '%s' "$VERSION" | grep -Eq '[-+]'; then
            IS_PRERELEASE="true"
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Show deployment context
        run: |
          echo "Deploying release tag: ${{ steps.meta.outputs.release_tag }}"
          echo "Image version tag: ${{ steps.meta.outputs.version }}"
          echo "Image minor tag: ${{ steps.meta.outputs.minor }}"
          echo "GitHub ref: ${GITHUB_REF}"
          echo "GitHub sha: ${GITHUB_SHA}"
          echo "Upstream source sha: ${{ github.event.inputs.source_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=${{ steps.meta.outputs.minor }}
            type=raw,value=latest,enable=${{ steps.meta.outputs.is_prerelease != 'true' }}
            type=sha,prefix=sha-

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deployment webhook
        if: ${{ env.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          AUTH_HEADER=""
          if [ -n "$DEPLOY_WEBHOOK_TOKEN" ]; then
            AUTH_HEADER="-H Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN"
          fi

          curl --fail --request POST \
            --url "$DEPLOY_WEBHOOK_URL" \
            --header "Content-Type: application/json" \
            $AUTH_HEADER \
            --data "{\"release_tag\":\"${{ steps.meta.outputs.release_tag }}\",\"sha\":\"${GITHUB_SHA}\"}"

      - name: Skip deployment if no webhook configured
        if: ${{ env.DEPLOY_WEBHOOK_URL == '' }}
        run: |
          echo "DEPLOY_WEBHOOK_URL is not configured."
          echo "Set GitHub Action secret DEPLOY_WEBHOOK_URL to enable deployment."
