stages:
  - lint
  - test
  - release-tag
  - build-image

variables:
  GITHUB_REPO: "https://github.com/lyndrix-platform/aac-template-engine"
  ANSIBLE_CI_IMAGE_PROJECT_URL: "https://gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image"
  ANSIBLE_CI_BASE_IMAGE: "registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest"

# Ensure global defaults for DRYness
default:
  tags:
    - docker

yaml-syntax-check:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir PyYAML
  script:
    - echo "🔎 Checking syntax of pure YAML files (excluding templates)..."
    # Added -not -path filters to avoid scanning directories we don't own or .j2 files
    - |
      find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
      -not -path "*/.*/*" \
      -not -name "*.j2" \
      -print0 | xargs -0 -n 1 python3 -c "import yaml, sys; print(f'-- Checking: {sys.argv[1]}'); yaml.safe_load(open(sys.argv[1]))"
  rules:
    - if: '$CI_COMMIT_BRANCH'

python-unit-tests:
  stage: test
  image: python:3.12-slim
  needs: ["yaml-syntax-check"]
  before_script:
    - pip install --no-cache-dir pytest pyyaml jinja2
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
  script:
    - echo "🧪 Running Python Processor Unit Tests..."
    # Exit code 5 means no tests found - we want to fail if someone deleted the tests
    - pytest tests/ -v
  rules:
    - if: '$CI_COMMIT_BRANCH'

create-release-tag:
  stage: release-tag
  image:
    name: alpine/git:v2.54.0
    entrypoint: [""]
  resource_group: create-release-tag
  needs: ["python-unit-tests"]
  script:
    - VERSION="$(awk -F'"' '/^__version__/ {print $2}' version.py)"
    - |
      if [ -z "$VERSION" ]; then
        echo "ERROR: Could not read __version__ from version.py"
        exit 1
      fi
    - TAG="v${VERSION#v}"
    - echo "Ensuring release tag ${TAG} exists..."
    - git fetch --tags origin
    - |
      if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
        echo "Tag ${TAG} already exists. Nothing to do."
        exit 0
      fi
    - git config user.name "${GITLAB_USER_NAME:-CI Release Bot}"
    - git config user.email "${GITLAB_USER_EMAIL:-ci-release-bot@local}"
    - git tag -a "$TAG" -m "Release $TAG"
    - |
      JOB_TOKEN_PUSH_URL="https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      FALLBACK_PUSH_TOKEN="${RELEASE_TAG_PUSH_TOKEN:-$CI_GLOBAL_TOKEN}"
      FALLBACK_PUSH_USER="${RELEASE_TAG_PUSH_USER:-oauth2}"
      FALLBACK_PUSH_URL="https://${FALLBACK_PUSH_USER}:${FALLBACK_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

      echo "Trying tag push with CI_JOB_TOKEN first..."
      if git push "$JOB_TOKEN_PUSH_URL" "refs/tags/$TAG"; then
        echo "Tag push with CI_JOB_TOKEN succeeded."
        exit 0
      fi

      if [ -n "$FALLBACK_PUSH_TOKEN" ]; then
        echo "CI_JOB_TOKEN push failed. Trying fallback token..."
        git push "$FALLBACK_PUSH_URL" "refs/tags/$TAG"
        exit 0
      fi

      echo "ERROR: CI_JOB_TOKEN push failed and no fallback token is set."
      echo "Enable CI job token write_repository or set RELEASE_TAG_PUSH_TOKEN/CI_GLOBAL_TOKEN."
      exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

trigger-github-release:
  stage: release-tag
  image: curlimages/curl:8.21.0
  needs: ["create-release-tag"]
  script:
    - VERSION="$(awk -F'"' '/^__version__/ {print $2}' version.py)"
    - |
      if [ -z "$VERSION" ]; then
        echo "ERROR: Could not read __version__ from version.py"
        exit 1
      fi
    - TAG="v${VERSION#v}"
    - |
      if [ -z "$GITHUB_REPO" ]; then
        echo "GITHUB_REPO is not configured. Skipping GitHub workflow dispatch."
        exit 0
      fi

      GITHUB_REPO_PATH="$GITHUB_REPO"
      GITHUB_REPO_PATH="${GITHUB_REPO_PATH#https://github.com/}"
      GITHUB_REPO_PATH="${GITHUB_REPO_PATH#http://github.com/}"
      GITHUB_REPO_PATH="${GITHUB_REPO_PATH#git@github.com:}"
      GITHUB_REPO_PATH="${GITHUB_REPO_PATH%.git}"

      if ! printf '%s' "$GITHUB_REPO_PATH" | grep -Eq '^[^/]+/[^/]+$'; then
        echo "ERROR: GITHUB_REPO must be owner/repo or a github.com URL. Current value: $GITHUB_REPO"
        exit 1
      fi

      if [ -z "$GITHUB_TOKEN" ]; then
        echo "GITHUB_TOKEN is not configured. Skipping GitHub workflow dispatch."
        exit 0
      fi
    - WORKFLOW_FILE="${GITHUB_RELEASE_WORKFLOW:-release.yml}"
    - echo "Dispatching GitHub workflow ${WORKFLOW_FILE} for ${GITHUB_REPO_PATH} (tag ${TAG})..."
    - |
      curl --fail-with-body --request POST \
        --url "https://api.github.com/repos/${GITHUB_REPO_PATH}/actions/workflows/${WORKFLOW_FILE}/dispatches" \
        --header "Authorization: Bearer ${GITHUB_TOKEN}" \
        --header "Accept: application/vnd.github+json" \
        --header "X-GitHub-Api-Version: 2022-11-28" \
        --data "{\"ref\":\"main\",\"inputs\":{\"release_tag\":\"${TAG}\",\"source_sha\":\"${CI_COMMIT_SHA}\"}}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

# ==========================================================================
# 3. DOCKER BUILD & PUSH
# ==========================================================================
build-engine-image:
  stage: build-image
  image: docker:29.6.1
  services:
    - name: docker:29.6.1-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_BUILDKIT: "0"
  needs: ["python-unit-tests"]
  script:
    - echo "Authenticating with GitLab Container Registry..."
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    
    # Ensure Docker pulls the absolute latest base image we just built upstream
    - 'echo "Using local base image project: ${ANSIBLE_CI_IMAGE_PROJECT_URL}"'
    - docker pull "$ANSIBLE_CI_BASE_IMAGE"
    
    - IMAGE_SHA="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    
    - echo "Building the monolithic AAC CI Image..."
    - docker build --pull --build-arg BASE_IMAGE="$ANSIBLE_CI_BASE_IMAGE" --tag "$IMAGE_SHA" .
    
    - echo "Pushing images to registry..."
    - docker push "$IMAGE_SHA"
    - |
      RELEASE_VERSION=""

      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$TRIGGER_SOURCE" = "base-image-update" ]; then
        RELEASE_VERSION="$(awk -F'"' '/^__version__/ {print $2}' version.py)"
        if [ -z "$RELEASE_VERSION" ]; then
          echo "ERROR: Could not read __version__ from version.py"
          exit 1
        fi
      fi

      RELEASE_MINOR="$(printf '%s' "$RELEASE_VERSION" | cut -d. -f1,2)"

      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$TRIGGER_SOURCE" = "base-image-update" ]; then
        IMAGE_LATEST="$CI_REGISTRY_IMAGE:latest"
        echo "Updating latest tag..."
        docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
        docker push "$IMAGE_LATEST"
      fi
      if [ -n "$RELEASE_VERSION" ] && ! docker pull "$CI_REGISTRY_IMAGE:$RELEASE_VERSION" >/dev/null 2>&1; then
        echo "Publishing release tags for ${RELEASE_VERSION}..."
        docker tag "$IMAGE_SHA" "$CI_REGISTRY_IMAGE:$RELEASE_VERSION"
        docker push "$CI_REGISTRY_IMAGE:$RELEASE_VERSION"

        docker tag "$IMAGE_SHA" "$CI_REGISTRY_IMAGE:$RELEASE_MINOR"
        docker push "$CI_REGISTRY_IMAGE:$RELEASE_MINOR"
      elif [ -n "$RELEASE_VERSION" ]; then
        echo "Pinned tag ${RELEASE_VERSION} already exists; leaving it unchanged."
      fi
  rules:
    # NEW: Run when code is merged to main OR when the base image triggers it
    - if: '$CI_COMMIT_BRANCH == "main" || $TRIGGER_SOURCE == "base-image-update"'
